<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>48小时维权倒计时</title>

<style>
body {
    margin: 0;
    background-color: red;
    color: black;
    font-family: Arial, sans-serif;

    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

/* 整体容器 */
.container {
    border: 5px solid black;
    padding: 40px;
    background-color: red;
}

/* 第一行标题 */
h1 {
    font-size: 48px;
    font-weight: bold;
    margin-bottom: 10px;
}

/* 第二行标题 */
h2 {
    font-size: 36px;
    font-weight: bold;
    margin-top: 0;
}

/* 倒计时 */
#timer {
    font-size: 100px;
    font-weight: bold;
    margin-top: 30px;
}

/* 按钮 */
button {
    margin-top: 30px;
    padding: 12px 25px;
    font-size: 18px;
    font-weight: bold;
    border: 2px solid black;
    background: white;
    cursor: pointer;
}

button:hover {
    background: black;
    color: red;
}
</style>
</head>

<body>

<div class="container">

    <h1>时代峰峻还我711</h1>
    <h2>48小时维权倒计时</h2>

    <div id="timer">加载中...</div>

    <button onclick="resetTimer()">重新开始</button>

</div>

<script>
if (!localStorage.endTime) {
    localStorage.endTime = new Date().getTime() + 48 * 60 * 60 * 1000;
}

function updateTimer() {
    let now = new Date().getTime();
    let diff = Math.floor((localStorage.endTime - now) / 1000);

    if (diff <= 0) {
        document.getElementById("timer").innerText = "时间到！";
        return;
    }

    let h = Math.floor(diff / 3600);
    let m = Math.floor((diff % 3600) / 60);
    let s = diff % 60;

    document.getElementById("timer").innerText =
        String(h).padStart(2,'0') + ":" +
        String(m).padStart(2,'0') + ":" +
        String(s).padStart(2,'0');
}

function resetTimer() {
    localStorage.endTime = new Date().getTime() + 48 * 60 * 60 * 1000;
}

setInterval(updateTimer, 1000);
updateTimer();
</script>

</body>
</html>
